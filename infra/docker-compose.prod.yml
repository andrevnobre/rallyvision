services:
  api:
    build: ../backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: ../backend
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/uploads
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=1

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_URL: https://api.bt-vision.com
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rally -d rallyvision"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  uploads:
